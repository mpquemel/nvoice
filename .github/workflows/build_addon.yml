name: Build NVDA Add-on

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons
        run: pip install scons markdown

      - name: Get SCons from NVDA Addon Template
        run: |
          git clone --depth 1 https://github.com/nvaccess/AddonTemplate.git scons_template
          Remove-Item -Recurse -Force site_scons -ErrorAction SilentlyContinue
          Remove-Item -Force sconstruct -ErrorAction SilentlyContinue
          Copy-Item -Recurse scons_template/site_scons .
          Copy-Item -Recurse scons_template/sconstruct .
          Remove-Item -Recurse scons_template

      - name: Build Addon
        run: scons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvoice-addon
          path: "*.nvda-addon"
          retention-days: 30

  validate:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: nvoice-addon
          path: dist/

      - name: List Artifacts
        run: ls -la dist/

      - name: Verify Addon Structure
        run: |
          cd dist/
          unzip -l *.nvda-addon | head -50
